<!doctype html>

  <title>Structured Sample</title>
</head>
<body>
  <article>
    <h1>Serious Reading</h1>
    <p>Dense material benefits from visual structure.</p>
    <ul>
      <li>First bullet clarifies the key idea.</li>
      <li>Second bullet keeps the outline readable.</li>
    </ul>

  </article>
