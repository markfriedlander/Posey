<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>List Test</title></head>
<body>
<h1>List Test</h1>
<p>Paragraph before lists.</p>
<ul>
<li>First bullet item</li>
<li>Second bullet item</li>
<li>Third bullet item</li>
</ul>
<p>Paragraph between lists.</p>
<ol>

<li>Second numbered item</li>
<li>Third numbered item</li>
</ol>
<p>Paragraph after lists.</p>
</body></html>
